apiVersion: apps/v1
kind: Deployment
metadata:
  name: colossus-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app: colossus-gateway
    component: gateway
spec:
  replicas: {{ .Values.replicaCount.gateway }}
  selector:
    matchLabels:
      app: colossus-gateway
  template:
    metadata:
      labels:
        app: colossus-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["ts-node", "src/gateway/index.ts"]
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - secretRef:
                name: colossus-secrets
          resources: {{ toYaml .Values.resources.gateway | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: colossus-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: colossus-gateway
  ports:
    - port: 4000
      targetPort: 4000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: colossus-gateway-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: colossus-gateway
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
