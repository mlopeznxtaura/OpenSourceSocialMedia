global:
  imageRegistry: ""
  imagePullSecrets: []
  namespace: colossus

image:
  repository: colossus/main-kernel
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount:
  gateway: 2
  identity: 2
  discovery: 1
  orchestrator: 1
  feed: 3

resources:
  gateway:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  identity:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 512Mi }
  feed:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 2Gi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  host: colossus.local
  tls: []

postgresql:
  auth:
    username: colossus
    password: ""  # set via --set or secret
    database: colossus
  primary:
    persistence:
      size: 20Gi

elasticsearch:
  replicas: 1
  resources:
    requests: { cpu: 500m, memory: 1Gi }

nats:
  nats:
    jetstream:
      enabled: true

vault:
  enabled: true
  server:
    dev:
      enabled: false  # production mode

miniKernels:
  phase0:  # auto-deployed at install
    - professional
    - personal-social
    - messaging
    - photo-sharing
    - video
  phase1:  # deployed on helm upgrade --set miniKernels.phase1.enabled=true
    enabled: false
    list:
      - music
      - live-dj
      - cad-collaboration
      - robotics
      - gaming
      - education
      - health
      - finance
      - travel
      - food
      - art
      - writing
      - ecommerce
      - news
      - events-calendar
      - environment
      - tech-opensource
      - sports
      - parenting
      - mental-health

secrets:
  existingSecret: ""  # point to pre-created K8s secret; if empty, chart creates one
