syntax = "proto3";
package colossus.kernel.v1;
option go_package = "github.com/colossus/kernel/proto/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// ── Mini-Kernel RPC contract ─────────────────────────────────────────────────

service MiniKernel {
  rpc GetCapabilities(CapabilitiesRequest) returns (CapabilitiesResponse);
  rpc ProcessEvent(Event) returns (EventAck);
  rpc QueryFeed(FeedQuery) returns (stream FeedItem);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message CapabilitiesRequest {}

message CapabilitiesResponse {
  string kernel_id      = 1;
  string kernel_name    = 2;
  string category       = 3;
  string version        = 4;
  repeated string event_subscriptions = 5;
  google.protobuf.Struct input_schema  = 6;
  google.protobuf.Struct output_schema = 7;
}

message Event {
  string id             = 1;
  string type           = 2;  // "user.follow", "content.like", etc.
  string source_kernel  = 3;
  string actor_id       = 4;
  google.protobuf.Struct payload = 5;
  google.protobuf.Timestamp created_at = 6;
}

message EventAck {
  string event_id = 1;
  bool   accepted = 2;
  string reason   = 3;
}

message FeedQuery {
  string  user_id   = 1;
  int32   limit     = 2;
  string  cursor    = 3;
  repeated string filters = 4;
}

message FeedItem {
  string id            = 1;
  string source_kernel = 2;
  string author_id     = 3;
  google.protobuf.Struct payload = 4;
  google.protobuf.Timestamp created_at = 5;
  string cursor        = 6;
}

message HealthRequest {}
message HealthResponse {
  string status = 1;  // "ok" | "degraded" | "down"
  string version = 2;
}
