{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: colossus-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  POSTGRES_URL: "postgresql://colossus:{{ .Values.postgresql.auth.password }}@colossus-postgresql:5432/colossus"
  NATS_URL: "nats://colossus-nats:4222"
  VAULT_ADDR: "http://colossus-vault:8200"
  VAULT_TOKEN: ""        # populate via CI/CD
  JWT_SECRET: ""         # RS256 private key – populate via CI/CD
  JWT_PUBLIC_KEY: ""     # RS256 public key
  ELASTICSEARCH_URL: "http://colossus-elasticsearch:9200"
  LINKEDIN_CLIENT_ID: ""
  LINKEDIN_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  DISCORD_CLIENT_ID: ""
  DISCORD_CLIENT_SECRET: ""
  SPOTIFY_CLIENT_ID: ""
  SPOTIFY_CLIENT_SECRET: ""
  TWITTER_CLIENT_ID: ""
  TWITTER_CLIENT_SECRET: ""
{{- end }}
